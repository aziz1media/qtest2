<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القرآن الكريم - القارئ الذكي</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-color: #ffffff;
            --ui-bg: rgba(255, 255, 255, 0.1);
            --border-color: #333333;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            height: 100dvh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        #app {
            width: 100%;
            max-width: 600px;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Top Section */
        .header {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .header-top {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select {
            flex: 1;
            padding: 10px;
            background-color: var(--ui-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .icon-btn {
            background: var(--ui-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            width: 44px;
            height: 44px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-color);
            opacity: 0.8;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: var(--ui-bg);
            border-radius: 2px;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--text-color);
        }

        /* Middle Section */
        .viewer {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        #content-area {
            width: 100%;
            direction: rtl;
        }

        .verse-mode {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 100%;
            font-size: 1.8rem;
            cursor: pointer;
        }

        /* Bottom Controls */
        .controls {
            display: flex;
            border-top: 1px solid var(--border-color);
            background: var(--bg-color);
        }

        .ctrl-btn {
            flex: 1;
            padding: 20px 0;
            border: none;
            background: transparent;
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.2s;
        }

        .ctrl-btn svg { width: 32px; height: 32px; fill: currentColor; }
        .ctrl-btn:disabled { opacity: 0.2; cursor: not-allowed; }

        /* Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 100;
            display: none;
            flex-direction: column;
        }

        .overlay-header {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .overlay-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* Modal */
        #modal-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        .modal {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 25px;
            border-radius: 12px;
            width: 80%;
            max-width: 400px;
            text-align: center;
        }
        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-btns button {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--ui-bg);
            color: var(--text-color);
            cursor: pointer;
        }

        /* Interactive Elements */
        .p-link { color: #3498db; text-decoration: underline; cursor: pointer; }
        .p-copy { color: #2ecc71; cursor: pointer; border-bottom: 1px dashed; }
        .p-audio { color: #f1c40f; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
        .p-img { max-width: 100%; height: auto; border-radius: 8px; margin: 10px 0; }
        
        #help-audio-stop {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #000;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: none;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 150;
        }

        #toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.9);
            color: #000;
            padding: 8px 20px;
            border-radius: 20px;
            display: none;
            z-index: 300;
        }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <div class="header-top">
            <select id="chapter-select"><option value="">اختر سورة</option></select>
            <button class="icon-btn" id="theme-btn" title="تغيير المظهر">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            </button>
            <button class="icon-btn" id="help-btn" title="المساعدة">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M11 18h2v-2h-2v2zm1-16C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-2.21 0-4 1.79-4 4h2c0-1.1.9-2 2-2s2 .9 2 2c0 2-3 1.75-3 5h2c0-2.25 3-2.5 3-5 0-2.21-1.79-4-4-4z"/></svg>
            </button>
        </div>
        <div class="status-bar">
            <span id="verse-label">-- / --</span>
            <div style="flex:1; margin: 0 15px;"><div class="progress-container"><div id="progress-bar"></div></div></div>
            <span id="chapter-name"></span>
        </div>
    </div>

    <div class="viewer" id="main-viewer">
        <div id="content-area"></div>
    </div>

    <div class="controls">
        <button class="ctrl-btn" id="prev-btn" title="السابق">
            <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn" id="play-btn" title="تشغيل/إيقاف">
            <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg id="pause-icon" style="display:none" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="ctrl-btn" id="next-btn" title="التالي">
            <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
    </div>

    <!-- Help Audio Stop Button -->
    <div id="help-audio-stop">X</div>
</div>

<div id="help-overlay" class="overlay">
    <div class="overlay-header">
        <span id="help-title">المساعدة</span>
        <button class="icon-btn" id="close-help">X</button>
    </div>
    <div class="overlay-content" id="help-content"></div>
</div>

<div id="modal-container">
    <div class="modal">
        <p id="modal-text">هل تريد الاستمرار من حيث توقفت؟</p>
        <div class="modal-btns">
            <button id="modal-continue">استمرار</button>
            <button id="modal-restart">البداية</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
    // --- APP STATE & CONFIG ---
    let state = {
        baseURL: '',
        overrides: new Set(),
        chapters: [],
        currentChapter: null,
        currentVerse: 1,
        settings: { size: 5, wait: 0, get: 0 },
        themes: [{ bg: '#000000', text: '#ffffff' }],
        currentThemeIdx: 0,
        cache: new Map(), // { path: text }
        audioCache: new Map(), // { path: audioObj }
        canNext: true,
        helpAudio: new Audio()
    };

    const mainAudio = new Audio();
    const elements = {
        chapterSelect: document.getElementById('chapter-select'),
        content: document.getElementById('content-area'),
        verseLabel: document.getElementById('verse-label'),
        chapterLabel: document.getElementById('chapter-name'),
        progressBar: document.getElementById('progress-bar'),
        playBtn: document.getElementById('play-btn'),
        prevBtn: document.getElementById('prev-btn'),
        nextBtn: document.getElementById('next-btn'),
        playIcon: document.getElementById('play-icon'),
        pauseIcon: document.getElementById('pause-icon'),
        themeBtn: document.getElementById('theme-btn'),
        helpBtn: document.getElementById('help-btn'),
        helpOverlay: document.getElementById('help-overlay'),
        helpContent: document.getElementById('help-content'),
        closeHelp: document.getElementById('close-help'),
        helpStop: document.getElementById('help-audio-stop'),
        toast: document.getElementById('toast'),
        modal: document.getElementById('modal-container'),
        modalText: document.getElementById('modal-text'),
        btnContinue: document.getElementById('modal-continue'),
        btnRestart: document.getElementById('modal-restart')
    };

    // --- INITIALIZATION ---
    async function init() {
        // 1. Data Mode
        const dataTxt = await fetchLocal('data.txt');
        if (dataTxt) {
            const lines = dataTxt.split('\n').map(l => l.trim()).filter(l => l);
            state.baseURL = lines[0].endsWith('/') ? lines[0] : lines[0] + '/';
            lines.slice(1).forEach(l => state.overrides.add(l));
        }

        // 2. Settings
        const settingsTxt = await smartFetch('settings.txt');
        if (settingsTxt) {
            settingsTxt.split('\n').forEach(line => {
                const [k, v] = line.split(':');
                if (k && v) state.settings[k.trim()] = parseInt(v.trim());
            });
        }

        // 3. Themes
        const themeTxt = await smartFetch('theme.txt');
        if (themeTxt) {
            state.themes = themeTxt.split('\n').filter(l => l.trim()).map(line => {
                const parts = line.trim().split(/\s+/);
                return { bg: parts[0], text: parts[1] };
            });
        }
        state.currentThemeIdx = parseInt(localStorage.getItem('themeIdx') || 0) % state.themes.length;
        applyTheme();

        // 4. Chapters (amount.txt)
        const amountTxt = await smartFetch('amount.txt');
        if (amountTxt) {
            const rows = amountTxt.split('\n').filter(l => l.trim());
            const chapterData = rows.map(r => {
                const p = r.trim().split(/\s+/);
                return { id: p[0], total: parseInt(p[1]), name: p.slice(2).join(' ') };
            });

            const allowedTxt = await smartFetch('allowed.txt');
            const allowed = allowedTxt ? new Set(allowedTxt.split('\n').map(l => l.trim())) : null;
            state.chapters = chapterData.filter(ch => !allowed || allowed.has(ch.id));
            
            state.chapters.forEach(ch => {
                const opt = document.createElement('option');
                opt.value = ch.id;
                opt.textContent = ch.name;
                elements.chapterSelect.appendChild(opt);
            });
        }

        // 5. Global Start Screen
        showInteractive('help/start.txt');

        // Event Listeners
        elements.chapterSelect.addEventListener('change', onChapterChange);
        elements.playBtn.addEventListener('click', togglePlay);
        elements.nextBtn.addEventListener('click', () => changeVerse(1));
        elements.prevBtn.addEventListener('click', () => changeVerse(-1));
        elements.themeBtn.addEventListener('click', cycleTheme);
        elements.helpBtn.addEventListener('click', () => showInteractive('help/help.txt', true));
        elements.closeHelp.addEventListener('click', () => elements.helpOverlay.style.display = 'none');
        elements.helpStop.addEventListener('click', stopHelpAudio);
        
        mainAudio.addEventListener('timeupdate', updateProgress);
        mainAudio.addEventListener('ended', () => { updateUI(); });
    }

    // --- FETCHING & CACHING ---
    async function fetchLocal(file) {
        try {
            const r = await fetch(file);
            return r.ok ? await r.text() : null;
        } catch { return null; }
    }

    async function smartFetch(file, skipCache = false) {
        if (!skipCache && state.cache.has(file)) return state.cache.get(file);
        const path = (state.baseURL && !state.overrides.has(file)) ? state.baseURL + file : file;
        try {
            const r = await fetch(path);
            const text = r.ok ? await r.text() : null;
            if (text && !skipCache) state.cache.set(file, text);
            return text;
        } catch { return null; }
    }

    function preloadNextVerses() {
        if (!state.currentChapter || state.settings.get <= 0) return;
        for (let i = 1; i <= state.settings.get; i++) {
            const v = state.currentVerse + i;
            if (v > state.currentChapter.total) break;
            const chId = state.currentChapter.id;
            const vId = pad(v);
            
            // Preload Text
            smartFetch(`chapters/${chId}/text/${vId}.txt`);
            
            // Preload Audio
            const aPath = `chapters/${chId}/audio/${vId}.mp3`;
            const fullAPath = state.baseURL ? state.baseURL + aPath : aPath;
            if (!state.audioCache.has(fullAPath)) {
                const a = new Audio(fullAPath);
                a.preload = "auto";
                state.audioCache.set(fullAPath, a);
            }
        }
    }

    // --- INTERACTIVE PARSER ---
    async function showInteractive(file, isOverlay = false) {
        const raw = await smartFetch(file, true);
        const container = isOverlay ? elements.helpContent : elements.content;
        
        if (isOverlay) {
            elements.helpOverlay.style.display = 'flex';
            elements.helpOverlay.scrollTop = 0;
        } else {
            elements.content.className = "";
            elements.content.style.minHeight = "auto";
        }

        container.innerHTML = parseInteractive(raw || "File not found.", file.includes('help/') ? 'help/' : '');
    }

    function parseInteractive(text, baseDir = '') {
        let align = 'right';
        const lines = text.split('\n');
        let html = '';

        lines.forEach(line => {
            let processed = line;

            // Alignment Tags
            if (line.includes('(T:S)')) { align = 'center'; processed = processed.replace('(T:S)', ''); }
            if (line.includes('(T:R)')) { align = 'right'; processed = processed.replace('(T:R)', ''); }
            if (line.includes('(T:L)')) { align = 'left'; processed = processed.replace('(T:L)', ''); }

            // Headings
            const hMatch = processed.match(/\(H([1-6]):(.*?)\)/);
            if (hMatch) {
                html += `<h${hMatch[1]} style="text-align:${align}">${hMatch[2]}</h${hMatch[1]}>`;
                return;
            }

            // Inline Formatting
            processed = processed.replace(/\(B:(.*?)\)/g, '<strong>$1</strong>');
            processed = processed.replace(/\(COLOR:(.*?)---(.*?)\)/g, '<span style="color:$2">$1</span>');
            processed = processed.replace(/\(SIZE:(.*?)---(.*?)\)/g, '<span style="font-size:$2">$1</span>');
            processed = processed.replace(/\(BR\)/g, '<br>');
            processed = processed.replace(/\(HR\)/g, '<hr style="border:0; border-top:1px solid var(--border-color)">');

            // Images
            processed = processed.replace(/\(IMG:(.*?)\)/g, (m, src) => {
                const isUrl = src.startsWith('http');
                const fullSrc = isUrl ? src : `img/${src}`;
                return `<img src="${fullSrc}" class="p-img" alt="Image">`;
            });

            // Copy
            processed = processed.replace(/\(COPY:(.*?)---(.*?)\)/g, `<span class="p-copy" onclick="copyText('${btoa(unescape(encodeURIComponent(processed.match(/\(COPY:(.*?)---(.*?)\)/)[2])))}', this)">$1</span>`);

            // Audio
            processed = processed.replace(/\(AUDIO:(.*?)---(.*?)\)/g, (m, lbl, url) => {
                return `<span class="p-audio" onclick="playHelpAudio('${url}')">🔊 ${lbl}</span>`;
            });

            // Links (External or Internal)
            processed = processed.replace(/\(LINK:(.*?)---(.*?)\)/g, (m, lbl, target) => {
                if (target.startsWith('http')) {
                    return `<a href="${target}" target="_blank" class="p-link">${lbl}</a>`;
                } else {
                    return `<span class="p-link" onclick="showInteractive('${baseDir}${target}', ${elements.helpOverlay.style.display==='flex'})">${lbl}</span>`;
                }
            });

            html += `<div style="text-align:${align}; margin-bottom:8px;">${processed}</div>`;
        });

        return html;
    }

    // --- CORE LOGIC ---
    async function onChapterChange() {
        const id = elements.chapterSelect.value;
        if (!id) return;

        state.currentChapter = state.chapters.find(c => c.id === id);
        const saved = localStorage.getItem(`progress_${id}`);
        
        if (saved && parseInt(saved) > 1) {
            elements.modalText.textContent = `هل تريد الاستمرار من حيث توقفت (الآية ${saved}) أم البدء من البداية؟`;
            elements.modal.style.display = 'flex';
            elements.btnContinue.onclick = () => { loadVerse(parseInt(saved)); elements.modal.style.display = 'none'; };
            elements.btnRestart.onclick = () => { loadVerse(1); elements.modal.style.display = 'none'; };
        } else {
            loadVerse(1);
        }
    }

    async function loadVerse(vNum) {
        state.currentVerse = vNum;
        const ch = state.currentChapter;
        const chId = ch.id;
        const vId = pad(vNum);

        // UI State
        elements.chapterLabel.textContent = ch.name;
        elements.verseLabel.textContent = `${vNum} / ${ch.total}`;
        elements.content.className = "verse-mode";
        elements.content.style.maxHeight = `${state.settings.size * 1.6}em`;
        elements.content.style.minHeight = `${state.settings.size * 1.6}em`;
        
        // Load Text
        const text = await smartFetch(`chapters/${chId}/text/${vId}.txt`);
        elements.content.textContent = text || "...";

        // Audio
        const aPath = `chapters/${chId}/audio/${vId}.mp3`;
        const fullAPath = state.baseURL ? state.baseURL + aPath : aPath;
        mainAudio.src = fullAPath;
        mainAudio.play().catch(() => {});
        
        // Persist
        localStorage.setItem(`progress_${chId}`, vNum);
        localStorage.setItem('lastPosition', JSON.stringify({ chId, vNum }));

        updateUI();
        preloadNextVerses();
    }

    async function changeVerse(dir) {
        if (dir === 1 && !state.canNext) return;

        const newV = state.currentVerse + dir;
        if (newV >= 1 && newV <= state.currentChapter.total) {
            // Apply delay for Next button
            if (dir === 1 && state.settings.wait > 0) {
                state.canNext = false;
                updateUI();
                setTimeout(() => { state.canNext = true; updateUI(); }, state.settings.wait);
            }
            loadVerse(newV);
        } else if (dir === 1 && newV > state.currentChapter.total) {
            // End of chapter
            showInteractive('help/end.txt');
        }
    }

    function togglePlay() {
        if (!state.currentChapter) return;
        if (mainAudio.paused) mainAudio.play();
        else mainAudio.pause();
        updateUI();
    }

    // --- HELPERS ---
    function updateUI() {
        elements.playIcon.style.display = mainAudio.paused ? 'block' : 'none';
        elements.pauseIcon.style.display = mainAudio.paused ? 'none' : 'block';
        
        elements.prevBtn.disabled = !state.currentChapter || state.currentVerse <= 1;
        elements.nextBtn.disabled = !state.currentChapter || !state.canNext;
    }

    function updateProgress() {
        if (mainAudio.duration) {
            const pct = (mainAudio.currentTime / mainAudio.duration) * 100;
            elements.progressBar.style.width = `${pct}%`;
        }
    }

    function applyTheme() {
        const theme = state.themes[state.currentThemeIdx];
        document.documentElement.style.setProperty('--bg-color', theme.bg);
        document.documentElement.style.setProperty('--text-color', theme.text);
        document.documentElement.style.setProperty('--accent-color', theme.text);
        document.documentElement.style.setProperty('--border-color', theme.text === '#000000' ? '#ccc' : '#333');
    }

    function cycleTheme() {
        state.currentThemeIdx = (state.currentThemeIdx + 1) % state.themes.length;
        localStorage.setItem('themeIdx', state.currentThemeIdx);
        applyTheme();
    }

    const pad = (n) => String(n).padStart(3, '0');

    function showToast(msg) {
        elements.toast.textContent = msg;
        elements.toast.style.display = 'block';
        setTimeout(() => elements.toast.style.display = 'none', 2000);
    }

    window.copyText = function(b64, el) {
        const text = decodeURIComponent(escape(atob(b64)));
        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        showToast("تم النسخ!");
    };

    window.playHelpAudio = function(url) {
        state.helpAudio.src = url;
        state.helpAudio.play();
        elements.helpStop.style.display = 'flex';
    };

    function stopHelpAudio() {
        state.helpAudio.pause();
        elements.helpStop.style.display = 'none';
    }

    init();
</script>

</body>
</html>
