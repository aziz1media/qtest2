<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القرآن الكريم</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #cbb26a;
            --border-color: #333;
            --button-hover: #2a2a2a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
        }

        #app {
            width: 100%;
            max-width: 600px;
            background-color: var(--container-bg);
            height: 100%;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Top Section */
        .header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
        }

        select {
            width: 100%;
            padding: 12px;
            background-color: #252525;
            color: var(--accent-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1.1rem;
            text-align: center;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .status-info {
            font-size: 0.9rem;
            margin-bottom: 10px;
            color: #888;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--accent-color);
            transition: width 0.1s linear;
        }

        /* Middle Section */
        .viewer {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        #verse-text-container {
            width: 100%;
            text-align: center;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 1.5rem;
            line-height: 1.6;
            cursor: pointer;
            transition: background 0.2s;
            padding: 10px;
            border-radius: 8px;
        }

        #verse-text-container:active {
            background: rgba(203, 178, 106, 0.1);
        }

        /* Bottom Section */
        .controls {
            display: flex;
            width: 100%;
            border-top: 1px solid var(--border-color);
            background: #181818;
        }

        .control-btn {
            flex: 1;
            padding: 25px 0;
            border: none;
            background: transparent;
            color: var(--text-color);
            font-size: 1.2rem;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .control-btn:hover {
            background-color: var(--button-hover);
        }

        .control-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .play-btn {
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            color: var(--accent-color);
            font-weight: bold;
        }

        /* Toast Message */
        #toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: none;
            z-index: 100;
        }

        /* Custom Scrollbar */
        #verse-text-container::-webkit-scrollbar {
            width: 4px;
        }
        #verse-text-container::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <select id="chapter-select">
            <option value="">اختر سورة</option>
        </select>
        <div class="status-info" id="verse-status">-- / --</div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <div class="viewer">
        <div id="verse-text-container">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
    </div>

    <div class="controls">
        <button class="control-btn" id="prev-btn">السابق</button>
        <button class="control-btn play-btn" id="play-btn">تشغيل</button>
        <button class="control-btn" id="next-btn">التالي</button>
    </div>
</div>

<div id="toast"></div>

<script>
    // Configuration & State
    let config = {
        baseURL: '',
        overrides: new Set(),
        chapters: [], // {id, total, name}
        currentChapter: null,
        currentVerse: 1,
        lineSize: 5,
        copyPrefix: '',
        copyDoneMsg: ''
    };

    const audio = new Audio();
    const chapterSelect = document.getElementById('chapter-select');
    const verseStatus = document.getElementById('verse-status');
    const progressBar = document.getElementById('progress-bar');
    const verseContainer = document.getElementById('verse-text-container');
    const playBtn = document.getElementById('play-btn');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const toast = document.getElementById('toast');

    // Helper: Pad numbers (1 -> 001)
    const pad = (num) => String(num).padStart(3, '0');

    // Helper: Fetch with fallback logic
    async function smartFetch(filename, isLocalOverride = false) {
        const path = (config.baseURL && !config.overrides.has(filename) && !isLocalOverride) 
            ? `${config.baseURL}${filename}` 
            : filename;
        
        try {
            const resp = await fetch(path);
            if (!resp.ok) throw new Error('Not found');
            return await resp.text();
        } catch (e) {
            return null;
        }
    }

    // Initialize App
    async function init() {
        // 1. Check data.txt for remote mode
        const dataTxt = await smartFetch('data.txt', true);
        if (dataTxt) {
            const lines = dataTxt.split('\n').map(l => l.trim()).filter(l => l);
            if (lines.length > 0) {
                config.baseURL = lines[0].endsWith('/') ? lines[0] : lines[0] + '/';
                for (let i = 1; i < lines.length; i++) {
                    config.overrides.add(lines[i]);
                }
            }
        }

        // 2. Load basic configs
        const sizeTxt = await smartFetch('size.txt');
        if (sizeTxt) {
            config.lineSize = parseInt(sizeTxt.trim()) || 5;
            // Set fixed height based on line size (approx 1.6em line height)
            verseContainer.style.maxHeight = `${config.lineSize * 1.6}em`;
            verseContainer.style.minHeight = `${config.lineSize * 1.6}em`;
        }

        const copyTxt = await smartFetch('copy.txt');
        config.copyPrefix = copyTxt ? copyTxt.trim() : '';

        const copyDoneTxt = await smartFetch('copy done.txt');
        config.copyDoneMsg = copyDoneTxt ? copyDoneTxt.trim() : 'تم النسخ';

        // 3. Load Chapters (amount.txt)
        const amountTxt = await smartFetch('amount.txt');
        if (!amountTxt) {
            showToast("خطأ: تعذر تحميل ملف amount.txt");
            return;
        }

        const chapterData = amountTxt.split('\n').filter(l => l.trim()).map(line => {
            const parts = line.trim().split(/\s+/);
            return {
                id: parts[0],
                total: parseInt(parts[1]),
                name: parts.slice(2).join(' ')
            };
        });

        // 4. Filter by allowed.txt if exists
        const allowedTxt = await smartFetch('allowed.txt');
        let allowedList = null;
        if (allowedTxt) {
            allowedList = new Set(allowedTxt.split('\n').map(l => l.trim()).filter(l => l));
        }

        // Build Dropdown
        config.chapters = chapterData.filter(ch => !allowedList || allowedList.has(ch.id));
        config.chapters.forEach(ch => {
            const opt = document.createElement('option');
            opt.value = ch.id;
            opt.textContent = ch.name;
            chapterSelect.appendChild(opt);
        });
    }

    // Load Verse Content
    async function loadVerse() {
        if (!config.currentChapter) return;

        const chId = config.currentChapter.id;
        const vId = pad(config.currentVerse);
        
        verseStatus.textContent = `${config.currentVerse} / ${config.currentChapter.total}`;
        
        // Load Text
        const textPath = `chapters/${chId}/text/${vId}.txt`;
        const textContent = await smartFetch(textPath);
        verseContainer.textContent = textContent || "...";

        // Update Audio Source
        const audioPath = `chapters/${chId}/audio/${vId}.mp3`;
        const fullAudioPath = config.baseURL ? `${config.baseURL}${audioPath}` : audioPath;
        
        audio.src = fullAudioPath;
        audio.load();
        updateUI();
    }

    function updateUI() {
        playBtn.textContent = audio.paused ? "تشغيل" : "إيقاف";
        progressBar.style.width = '0%';
        
        // Disable buttons at boundaries
        prevBtn.disabled = !config.currentChapter || config.currentVerse === 1;
        nextBtn.disabled = !config.currentChapter || config.currentVerse === config.currentChapter.total;
    }

    // Events
    chapterSelect.addEventListener('change', (e) => {
        const id = e.target.value;
        if (!id) return;
        
        config.currentChapter = config.chapters.find(c => c.id === id);
        config.currentVerse = 1;
        loadVerse();
    });

    playBtn.addEventListener('click', () => {
        if (!config.currentChapter) return;
        if (audio.paused) {
            audio.play().catch(e => console.error("Playback failed", e));
        } else {
            audio.pause();
        }
        updateUI();
    });

    nextBtn.addEventListener('click', () => {
        if (config.currentChapter && config.currentVerse < config.currentChapter.total) {
            config.currentVerse++;
            loadVerse();
        }
    });

    prevBtn.addEventListener('click', () => {
        if (config.currentChapter && config.currentVerse > 1) {
            config.currentVerse--;
            loadVerse();
        }
    });

    audio.addEventListener('timeupdate', () => {
        if (audio.duration) {
            const pct = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = `${pct}%`;
        }
    });

    audio.addEventListener('ended', () => {
        updateUI(); // Resets play button text, does not auto-advance
    });

    // Copy Feature
    verseContainer.addEventListener('click', () => {
        if (!config.currentChapter) return;

        const copyString = `${config.copyPrefix} ${config.currentChapter.id} ${config.currentChapter.name} ${config.currentVerse}`;
        
        const el = document.createElement('textarea');
        el.value = copyString;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);

        showToast(config.copyDoneMsg);
    });

    function showToast(msg) {
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 2000);
    }

    // Start
    window.onload = init;

</script>

</body>
</html>
