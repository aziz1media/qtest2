<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- Cache-Control Meta Tags -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>مصحف التلاوة</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap');
        
        :root {
            --bg-color: #121212;
            --text-color: #E0E0E0;
            --accent-color: #00b894;
            --panel-bg: #1e1e1e;
            --line-height: 1.8;
            --max-lines: 7;
        }

        body {
            font-family: 'Amiri', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            height: -webkit-fill-available; 
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        header { flex-shrink: 0; padding-top: env(safe-area-inset-top, 1rem); z-index: 20; }

        .progress-container { width: 100%; height: 6px; background-color: rgba(255, 255, 255, 0.1); flex-shrink: 0; }
        .progress-bar { height: 100%; width: 0%; background-color: var(--accent-color); transition: width 0.3s ease; }

        .verse-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            text-align: center;
            position: relative;
        }

        .verse-text-wrapper {
            width: 100%;
            height: calc(clamp(1.5rem, 5.5vw, 2.8rem) * var(--line-height) * var(--max-lines));
            max-width: 800px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-color) transparent;
        }

        .verse-text {
            font-size: clamp(1.5rem, 5.5vw, 2.8rem);
            line-height: var(--line-height);
            word-wrap: break-word;
            padding: 10px;
            width: 100%;
            margin: auto 0;
        }

        .controls-panel {
            background-color: var(--panel-bg);
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.3);
            z-index: 10;
            width: 100%;
            flex-shrink: 0;
            padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 1.5rem); 
            border-top-left-radius: 24px; border-top-right-radius: 24px;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            height: 80px; width: 100%;
            direction: ltr !important;
            max-width: 600px; margin: 0 auto;
        }

        .nav-btn {
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.1s;
            background: transparent; color: var(--text-color);
            -webkit-tap-highlight-color: transparent;
        }
        .nav-btn:active { transform: scale(0.92); }

        .play-pause-container {
            background-color: var(--accent-color) !important;
            color: white !important;
            border-radius: 50%; width: 64px; height: 64px;
            margin: auto; box-shadow: 0 4px 15px rgba(0, 184, 148, 0.4);
        }

        select, .icon-btn {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-color);
            padding: 0.5rem 0.7rem; border-radius: 12px;
            font-size: 0.9rem; font-weight: bold; outline: none;
        }

        /* Modal & Formatting Styles */
        #helpModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); z-index: 100;
            display: flex; flex-direction: column;
            padding: env(safe-area-inset-top, 1rem) 1rem env(safe-area-inset-bottom, 1rem) 1rem;
            transform: translateY(100%); transition: transform 0.4s ease;
        }
        #helpModal.active { transform: translateY(0); }
        .help-content { flex-grow: 1; overflow-y: auto; padding: 1rem; }

        .help-link { color: var(--accent-color); text-decoration: underline; cursor: pointer; font-weight: bold; }
        
        /* Toast Notification */
        #toast {
            position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8); color: white;
            padding: 10px 20px; border-radius: 20px; z-index: 200;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }

        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1); border-top: 4px solid var(--accent-color);
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }

        /* Dynamic Classes for Parser */
        .align-center { text-align: center !important; width: 100%; display: block; }
        .align-right { text-align: right !important; width: 100%; display: block; }
        .align-left { text-align: left !important; width: 100%; display: block; }
        h1, h2, h3, h4, h5, h6 { font-weight: bold; margin: 0.5em 0; }
        h1 { font-size: 2em; } h2 { font-size: 1.7em; } h3 { font-size: 1.5em; }
    </style>
</head>
<body>

    <header class="p-3">
        <div class="max-w-md mx-auto flex items-center justify-between gap-2">
            <select id="chapterSelector" class="flex-grow"></select>
            <div class="flex gap-2">
                <button id="btnHelp" class="icon-btn" title="مساعدة">؟</button>
                <button id="themeToggle" class="icon-btn">🎨</button>
            </div>
        </div>
        <div id="verseIndicator" class="text-center mt-2 text-md opacity-70 font-bold">-- / --</div>
    </header>

    <div class="progress-container"><div id="progressBar" class="progress-bar"></div></div>

    <main class="verse-container" id="verseArea">
        <div id="loading" class="loader hidden"></div>
        <div class="verse-text-wrapper" id="verseWrapper">
            <div id="verseText" class="verse-text"></div>
        </div>
    </main>

    <footer class="controls-panel">
        <div class="footer-grid">
            <button id="btnLeft" class="nav-btn">
                <svg width="40" height="40" fill="currentColor" viewBox="0 0 256 256"><path d="M165.66,202.34a8,8,0,0,1-11.32,11.32l-80-80a8,8,0,0,1,0-11.32l80-80a8,8,0,0,1,11.32,11.32L91.31,128Z"></path></svg>
            </button>
            <button id="btnPlayPause" class="nav-btn">
                <div class="play-pause-container flex items-center justify-center">
                    <svg id="playIcon" width="32" height="32" fill="currentColor" viewBox="0 0 256 256"><path d="M240,128a15.74,15.74,0,0,1-7.6,13.51L88.32,229.75a16,16,0,0,1-24.32-13.51V40a16,16,0,0,1,24.32-13.51L232.4,114.49A15.74,15.74,0,0,1,240,128Z"></path></svg>
                    <svg id="pauseIcon" class="hidden" width="32" height="32" fill="currentColor" viewBox="0 0 256 256"><path d="M216,48V208a16,16,0,0,1-16,16H160a16,16,0,0,1-16-16V48a16,16,0,0,1,16-16h40A16,16,0,0,1,216,48ZM96,32H56A16,16,0,0,0,40,48V208a16,16,0,0,0,16,16H96a16,16,0,0,0,16-16V48A16,16,0,0,0,96,32Z"></path></svg>
                </div>
            </button>
            <button id="btnRight" class="nav-btn">
                <svg width="40" height="40" fill="currentColor" viewBox="0 0 256 256"><path d="M181.66,133.66l-80,80a8,8,0,0,1-11.32-11.32L164.69,128,90.34,53.66a8,8,0,0,1,11.32-11.32l80,80A8,8,0,0,1,181.66,133.66Z"></path></svg>
            </button>
        </div>
    </footer>

    <div id="helpModal">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold">المساعدة</h2>
            <button id="btnCloseHelp" class="icon-btn bg-red-500 text-white border-none">إغلاق</button>
        </div>
        <div id="helpContent" class="help-content"></div>
    </div>

    <div id="toast">تم النسخ</div>
    <audio id="audioPlayer"></audio>

    <script>
        const themes = [
            { bg: '#121212', text: '#E0E0E0', panel: '#1e1e1e' },
            { bg: '#FAF3DD', text: '#000000', panel: '#f0e9d2' },
            { bg: '#F3E6D0', text: '#3B2417', panel: '#e6d8c0' },
            { bg: '#F9ECB6', text: '#061349', panel: '#eedf9f' }
        ];

        let basePath = "", currentChapter = localStorage.getItem('lastChapter') || "", currentVerse = parseInt(localStorage.getItem('lastVerse')) || 0;
        let chapterAmounts = {}, currentThemeIndex = parseInt(localStorage.getItem('currentThemeIndex')) || 0;
        const SESSION = Date.now();

        const ui = {
            chapterSelector: document.getElementById('chapterSelector'),
            verseText: document.getElementById('verseText'),
            verseWrapper: document.getElementById('verseWrapper'),
            verseIndicator: document.getElementById('verseIndicator'),
            progressBar: document.getElementById('progressBar'),
            audio: document.getElementById('audioPlayer'),
            btnPlayPause: document.getElementById('btnPlayPause'),
            playIcon: document.getElementById('playIcon'),
            pauseIcon: document.getElementById('pauseIcon'),
            loader: document.getElementById('loading'),
            themeToggle: document.getElementById('themeToggle'),
            btnHelp: document.getElementById('btnHelp'),
            helpModal: document.getElementById('helpModal'),
            helpContent: document.getElementById('helpContent'),
            toast: document.getElementById('toast')
        };

        const getUrl = (f) => `${f}?v=${SESSION}`;

        async function init() {
            try {
                // Fetch data.txt
                const dRes = await fetch(getUrl('data.txt')).catch(()=>({ok:false}));
                basePath = (dRes.ok ? (await dRes.text()).trim() : "") || "";
                if (basePath && !basePath.endsWith('/')) basePath += '/';

                // Fetch size.txt
                const sRes = await fetch(getUrl(basePath + 'size.txt')).catch(()=>({ok:false}));
                if (sRes.ok) document.documentElement.style.setProperty('--max-lines', (await sRes.text()).trim());

                // Fetch amount.txt (Acts as the allowed folder list)
                const aRes = await fetch(getUrl(basePath + 'amount.txt')).catch(()=>({ok:false}));
                if (aRes.ok) {
                    const lines = (await aRes.text()).split('\n');
                    ui.chapterSelector.innerHTML = '<option value="">اختر السورة</option>';
                    lines.forEach(l => {
                        const [c, n] = l.trim().split(/\s+/);
                        if (c && n) {
                            chapterAmounts[c] = parseInt(n);
                            const opt = document.createElement('option');
                            opt.value = c; opt.textContent = c; // Or lookup name if preferred
                            if (c === currentChapter) opt.selected = true;
                            ui.chapterSelector.appendChild(opt);
                        }
                    });
                }

                setTheme(currentThemeIndex);

                if (!currentChapter) {
                    displayFormattedFile('help/start.txt');
                } else {
                    loadVerse(currentChapter, currentVerse || 1, false);
                }
            } catch (e) { console.error(e); }
        }

        function setTheme(i) {
            const t = themes[i];
            document.documentElement.style.setProperty('--bg-color', t.bg);
            document.documentElement.style.setProperty('--text-color', t.text);
            document.documentElement.style.setProperty('--panel-bg', t.panel);
            localStorage.setItem('currentThemeIndex', i);
            currentThemeIndex = i;
        }

        function parseCustomFormatting(text) {
            let currentAlign = 'align-right';
            const lines = text.split('\n');
            let html = "";

            lines.forEach(line => {
                let l = line.trim();
                if (!l) return;

                // Alignment tags
                if (l === '(T:S)') { currentAlign = 'align-center'; return; }
                if (l === '(T:R)') { currentAlign = 'align-right'; return; }
                if (l === '(T:L)') { currentAlign = 'align-left'; return; }

                // Heading tags
                const hMatch = l.match(/^\(H([1-6]):\s*(.*)\)$/);
                if (hMatch) {
                    html += `<h${hMatch[1]} class="${currentAlign}">${hMatch[2]}</h${hMatch[1]}>`;
                    return;
                }

                // Link Patterns
                l = l.replace(/\((.*?) --- (http.*?)\)/g, '<a href="$2" target="_blank" class="help-link">$1</a>');
                l = l.replace(/\((.*?) --- root:(.*?)\)/g, '<span onclick="openHelpFile(\'$2\')" class="help-link">$1</span>');

                html += `<div class="${currentAlign}">${l}</div>`;
            });
            return html;
        }

        async function displayFormattedFile(path, target = ui.verseText) {
            try {
                const res = await fetch(getUrl(basePath + path));
                if (!res.ok) return;
                const buffer = await res.arrayBuffer();
                const text = new TextDecoder("utf-8").decode(buffer);
                target.innerHTML = parseCustomFormatting(text);
                ui.verseWrapper.scrollTop = 0;
            } catch (e) { target.innerHTML = "خطأ في تحميل الملف"; }
        }

        window.openHelpFile = (num) => {
            displayFormattedFile(`help/${num}.txt`, ui.helpContent);
        };

        async function loadVerse(c, v, play = true) {
            if (!c || v < 1) return;
            if (v > chapterAmounts[c]) {
                displayFormattedFile('help/end.txt');
                ui.audio.pause();
                return;
            }

            ui.loader.classList.remove('hidden');
            ui.verseText.style.opacity = '0.3';

            const vStr = v.toString().padStart(3, '0');
            const txtUrl = getUrl(`${basePath}chapters/${c}/text/${vStr}.txt`);
            const audUrl = getUrl(`${basePath}chapters/${c}/audio/${vStr}.mp3`);

            try {
                const res = await fetch(txtUrl);
                const buffer = await res.arrayBuffer();
                ui.verseText.textContent = new TextDecoder("utf-8").decode(buffer);
                
                ui.audio.src = audUrl;
                currentVerse = v;
                currentChapter = c;
                localStorage.setItem('lastChapter', c);
                localStorage.setItem('lastVerse', v);

                ui.verseIndicator.textContent = `${v} / ${chapterAmounts[c] || '--'}`;
                ui.progressBar.style.width = `${(v / chapterAmounts[c]) * 100}%`;

                if (play) ui.audio.play().catch(() => {});
                
                ui.loader.classList.add('hidden');
                ui.verseText.style.opacity = '1';

                // Preload next 3
                for (let i = 1; i <= 3; i++) {
                    const nextV = (v + i).toString().padStart(3, '0');
                    if (v + i <= chapterAmounts[c]) {
                        fetch(getUrl(`${basePath}chapters/${c}/text/${nextV}.txt`));
                        fetch(getUrl(`${basePath}chapters/${c}/audio/${nextV}.mp3`));
                    }
                }
            } catch (e) { 
                ui.loader.classList.add('hidden');
                ui.verseText.style.opacity = '1';
            }
        }

        async function copyVerseInfo() {
            try {
                const cRes = await fetch(getUrl(basePath + 'copy.txt'));
                const prefix = cRes.ok ? (await cRes.text()).trim() : "";
                const str = `${prefix} chapter ${currentChapter}, verse ${currentVerse}`;
                
                const el = document.createElement('textarea');
                el.value = str; document.body.appendChild(el);
                el.select(); document.execCommand('copy');
                document.body.removeChild(el);

                const sRes = await fetch(getUrl('successfullyCopied.txt'));
                ui.toast.textContent = sRes.ok ? (await sRes.text()).trim() : "تم النسخ";
                ui.toast.style.opacity = '1';
                setTimeout(() => ui.toast.style.opacity = '0', 2000);
            } catch (e) {}
        }

        // Listeners
        ui.chapterSelector.onchange = (e) => { if(e.target.value) loadVerse(e.target.value, 1); };
        ui.btnPlayPause.onclick = () => ui.audio.paused ? ui.audio.play() : ui.audio.pause();
        ui.btnRight.onclick = () => loadVerse(currentChapter, currentVerse + 1);
        ui.btnLeft.onclick = () => { if(currentVerse > 1) loadVerse(currentChapter, currentVerse - 1); };
        ui.themeToggle.onclick = () => setTheme((currentThemeIndex + 1) % themes.length);
        ui.btnHelp.onclick = () => { ui.helpModal.classList.add('active'); openHelpFile('1'); };
        document.getElementById('btnCloseHelp').onclick = () => ui.helpModal.classList.remove('active');
        ui.verseWrapper.onclick = () => { if(currentChapter) copyVerseInfo(); };

        ui.audio.onplay = () => { ui.playIcon.classList.add('hidden'); ui.pauseIcon.classList.remove('hidden'); };
        ui.audio.onpause = () => { ui.playIcon.classList.remove('hidden'); ui.pauseIcon.classList.add('hidden'); };
        ui.audio.onended = () => loadVerse(currentChapter, currentVerse + 1);

        init();
    </script>
</body>
</html>
