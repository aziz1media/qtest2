<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قارئ القرآن الكريم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri&family=Noto+Sans+Arabic:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans Arabic', 'Amiri', serif;
            background-color: #f8fafc;
            user-select: none;
        }

        .verse-container {
            transition: all 0.3s ease;
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }

        .verse-container::-webkit-scrollbar {
            width: 6px;
        }

        .verse-container::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }

        .progress-bar-fill {
            transition: width 0.1s linear;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 50;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: left 1rem center;
            background-size: 1em;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col border border-slate-100">
        <!-- Top Section -->
        <div class="p-6 space-y-4">
            <select id="chapterSelect" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg text-lg font-bold text-center focus:outline-none focus:ring-2 focus:ring-emerald-500">
                <option value="">اختر سورة</option>
            </select>

            <div id="statusInfo" class="flex justify-between items-center text-sm font-medium text-slate-500 opacity-0 transition-opacity duration-300">
                <span id="verseCounter">0 / 0</span>
                <span id="chapterNameDisplay">--</span>
            </div>

            <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                <div id="progressBar" class="progress-bar-fill bg-emerald-500 h-full w-0"></div>
            </div>
        </div>

        <!-- Middle Section (Verse Text) -->
        <div class="px-6 py-4 flex-grow bg-slate-50/50">
            <div id="verseBox" class="verse-container w-full bg-white border border-slate-200 rounded-xl p-4 flex items-center justify-center text-center cursor-pointer hover:border-emerald-300 transition-colors overflow-y-auto" style="min-height: 150px;">
                <p id="verseText" class="text-2xl leading-relaxed text-slate-800 rtl"></p>
            </div>
        </div>

        <!-- Bottom Section (Controls) -->
        <div class="p-6 flex items-center justify-between border-t border-slate-100">
            <button id="prevBtn" class="w-1/3 flex flex-col items-center justify-center space-y-1 text-slate-600 hover:text-emerald-600 transition-colors disabled:opacity-30">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                <span class="text-xs font-bold uppercase tracking-wider">السابق</span>
            </button>

            <button id="playPauseBtn" class="w-1/3 flex flex-col items-center justify-center space-y-1 text-emerald-600 hover:scale-105 transition-transform">
                <div class="p-3 bg-emerald-100 rounded-full">
                    <svg id="playIcon" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    <svg id="pauseIcon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                </div>
                <span id="playLabel" class="text-xs font-bold uppercase tracking-wider">تشغيل</span>
            </button>

            <button id="nextBtn" class="w-1/3 flex flex-col items-center justify-center space-y-1 text-slate-600 hover:text-emerald-600 transition-colors disabled:opacity-30">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                <span class="text-xs font-bold uppercase tracking-wider">التالي</span>
            </button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast bg-slate-800 text-white px-6 py-3 rounded-full shadow-lg text-sm font-medium"></div>

    <audio id="audioPlayer" class="hidden"></audio>

    <script>
        // --- State Management ---
        const state = {
            chapters: [],
            allowedChapters: null,
            currentChapter: null,
            currentVerse: 1,
            baseUrl: '',
            remoteMode: false,
            localOverrides: [],
            config: {
                amount: '',
                size: 5,
                copyPrefix: '',
                copyDone: ''
            }
        };

        // --- DOM Elements ---
        const els = {
            chapterSelect: document.getElementById('chapterSelect'),
            verseCounter: document.getElementById('verseCounter'),
            chapterNameDisplay: document.getElementById('chapterNameDisplay'),
            progressBar: document.getElementById('progressBar'),
            verseBox: document.getElementById('verseBox'),
            verseText: document.getElementById('verseText'),
            playPauseBtn: document.getElementById('playPauseBtn'),
            playIcon: document.getElementById('playIcon'),
            pauseIcon: document.getElementById('pauseIcon'),
            playLabel: document.getElementById('playLabel'),
            prevBtn: document.getElementById('prevBtn'),
            nextBtn: document.getElementById('nextBtn'),
            audioPlayer: document.getElementById('audioPlayer'),
            statusInfo: document.getElementById('statusInfo'),
            toast: document.getElementById('toast')
        };

        // --- File Loading Logic ---
        async function fetchFile(filename, isOptional = false) {
            let url = filename;
            
            // Check if we should use remote URL
            if (state.remoteMode && !state.localOverrides.includes(filename)) {
                url = state.baseUrl + filename;
            }

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`Not found: ${url}`);
                return await response.text();
            } catch (err) {
                if (isOptional) return null;
                console.error(`Error loading ${filename}:`, err);
                return null;
            }
        }

        function getFileUrl(path) {
            if (state.remoteMode) return state.baseUrl + path;
            return path;
        }

        // --- Initialization ---
        async function init() {
            // 1. Check for data.txt (Remote Mode)
            const dataTxt = await fetch('data.txt', true);
            if (dataTxt) {
                const lines = dataTxt.split('\n').map(l => l.trim()).filter(l => l);
                if (lines.length > 0) {
                    state.remoteMode = true;
                    state.baseUrl = lines[0].endsWith('/') ? lines[0] : lines[0] + '/';
                    state.localOverrides = lines.slice(1);
                }
            }

            // 2. Load Core Config Files
            const [amountData, sizeData, allowedData, copyData, copyDoneData] = await Promise.all([
                fetchFile('amount.txt'),
                fetchFile('size.txt'),
                fetchFile('allowed.txt', true),
                fetchFile('copy.txt'),
                fetchFile('copy done.txt')
            ]);

            // Parse amount.txt
            if (amountData) {
                state.chapters = amountData.split('\n').filter(l => l.trim()).map(line => {
                    const [num, count, name] = line.trim().split(/\s+/);
                    return { num, count: parseInt(count), name };
                });
            }

            // Parse size.txt
            if (sizeData) {
                state.config.size = parseInt(sizeData.trim()) || 5;
                // Calculate height based on line height (~1.5rem) and lines
                const calculatedHeight = (state.config.size * 1.5) + 'rem';
                els.verseBox.style.height = calculatedHeight;
            }

            // Parse allowed.txt
            if (allowedData) {
                state.allowedChapters = allowedData.split('\n').map(l => l.trim()).filter(l => l);
            }

            state.config.copyPrefix = copyData ? copyData.trim() : '';
            state.config.copyDone = copyDoneData ? copyDoneData.trim() : 'تم النسخ';

            populateChapterList();
        }

        function populateChapterList() {
            const filtered = state.allowedChapters 
                ? state.chapters.filter(c => state.allowedChapters.includes(c.num))
                : state.chapters;

            filtered.forEach(ch => {
                const opt = document.createElement('option');
                opt.value = ch.num;
                opt.textContent = ch.name;
                els.chapterSelect.appendChild(opt);
            });
        }

        // --- Core Functionality ---
        function pad(num) {
            return num.toString().padStart(3, '0');
        }

        async function loadVerse(chapterNum, verseNum) {
            const chapter = state.chapters.find(c => c.num === chapterNum);
            if (!chapter) return;

            state.currentVerse = verseNum;
            state.currentChapter = chapter;

            // UI Updates
            els.statusInfo.classList.remove('opacity-0');
            els.verseCounter.textContent = `${verseNum} / ${chapter.count}`;
            els.chapterNameDisplay.textContent = chapter.name;
            els.progressBar.style.width = `${(verseNum / chapter.count) * 100}%`;
            
            // Toggle buttons
            els.prevBtn.disabled = verseNum <= 1;
            els.nextBtn.disabled = verseNum >= chapter.count;

            // Load Text
            const textPath = `chapters/${chapterNum}/text/${pad(verseNum)}.txt`;
            const text = await fetchFile(textPath);
            els.verseText.textContent = text || "...";
            els.verseBox.scrollTop = 0;

            // Load Audio
            const audioPath = `chapters/${chapterNum}/audio/${pad(verseNum)}.mp3`;
            els.audioPlayer.src = getFileUrl(audioPath);
            stopPlayback();
        }

        function togglePlayback() {
            if (!state.currentChapter) return;

            if (els.audioPlayer.paused) {
                els.audioPlayer.play().catch(e => console.error("Audio playback failed", e));
                els.playIcon.classList.add('hidden');
                els.pauseIcon.classList.remove('hidden');
                els.playLabel.textContent = "إيقاف";
            } else {
                stopPlayback();
            }
        }

        function stopPlayback() {
            els.audioPlayer.pause();
            els.playIcon.classList.remove('hidden');
            els.pauseIcon.classList.add('hidden');
            els.playLabel.textContent = "تشغيل";
        }

        function showToast(msg) {
            els.toast.textContent = msg;
            els.toast.classList.add('show');
            setTimeout(() => els.toast.classList.remove('show'), 2000);
        }

        function copyVerse() {
            if (!state.currentChapter) return;

            const text = `${state.config.copyPrefix} ${state.currentChapter.num} ${state.currentChapter.name} ${state.currentVerse}`;
            
            // Traditional copy fallback
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showToast(state.config.copyDone);
            } catch (err) {
                console.error('Copy failed', err);
            }
            document.body.removeChild(textArea);
        }

        // --- Event Listeners ---
        els.chapterSelect.addEventListener('change', (e) => {
            if (e.target.value) {
                loadVerse(e.target.value, 1);
            }
        });

        els.playPauseBtn.addEventListener('click', togglePlayback);

        els.nextBtn.addEventListener('click', () => {
            if (state.currentChapter && state.currentVerse < state.currentChapter.count) {
                loadVerse(state.currentChapter.num, state.currentVerse + 1);
            }
        });

        els.prevBtn.addEventListener('click', () => {
            if (state.currentChapter && state.currentVerse > 1) {
                loadVerse(state.currentChapter.num, state.currentVerse - 1);
            }
        });

        els.verseBox.addEventListener('click', copyVerse);

        els.audioPlayer.addEventListener('timeupdate', () => {
            const p = (els.audioPlayer.currentTime / els.audioPlayer.duration) * 100;
            if (!isNaN(p)) {
                // We keep progress bar tied to verse count generally, 
                // but we could overlay audio progress if desired. 
                // Currently, UI requirement implies progress = verse position.
            }
        });

        els.audioPlayer.addEventListener('ended', () => {
            stopPlayback();
        });

        // Initialize on load
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
